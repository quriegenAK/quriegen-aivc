# AIVC v1.1 Neumann W-scale sweep configuration
# Used by: platform/tracking/wandb_config.py SWEEP_CONFIG
# Run with: wandb sweep configs/sweep_w_scale.yaml

method: bayes
metric:
  name: val/pearson_r
  goal: maximize

parameters:
  w_scale_min:
    min: 0.001
    max: 0.1
  w_scale_max:
    min: 0.05
    max: 0.5
  neumann_K:
    values: [2, 3, 5]
  lfc_beta:
    values: [0.05, 0.10, 0.20, 0.50]
  lambda_l1:
    values: [0.0001, 0.001, 0.01]
  lr:
    min: 1.0e-5
    max: 1.0e-3
    distribution: log_uniform_values
