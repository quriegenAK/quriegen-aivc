# DOGMA pretrain config (spec §9, pre-registered 2026-04-28).
# Consumed by scripts/pretrain_multiome.py via --config flag.

optimizer:
  type: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]

schedule:
  type: warmup_cosine
  warmup_steps: 500
  # Total steps computed from epochs * steps_per_epoch at runtime.

training:
  epochs: 50
  batch_size: 256
  seed: 0
  # Early stop (Calderon ARI plateau) is implemented in PR #42 onward;
  # this PR provides the loop infra only.

compute:
  max_gpu_hours: 24  # informational; surfaced in logs

checkpoint:
  dir: checkpoints/pretrain
  every_n_epochs: 5

wandb:
  project: aivc-pretrain
  enabled: true

# Architecture dims (encoder latent sizes — matches existing defaults).
model:
  rna_latent: 128
  atac_latent: 64
  proj_dim: 128

# PR #54: Supervised contrastive (Khosla 2020) + VICReg variance term.
# Activates only when supcon.enabled=true. The training script will then
# load the LABELED h5ads (dogma_*_union_labeled.h5ad) and stamp
# z_supcon = L2_normalize(mean(L2_normalize(z_rna) + L2_normalize(z_atac)
# + L2_normalize(z_protein))) per batch.
supcon:
  enabled: true
  lambda_supcon: 0.5
  lambda_vicreg: 0.1
  temperature: 0.07
  vicreg_target_std: 1.0
  # SupCon eligibility filters (cells failing these get supcon_eligible=False
  # and are excluded as anchors but still serve as negatives).
  masked_classes: ["other", "other_T"]
  min_confidence: 0.6
  # Canonical {cell_type: int} manifest. Must be the same one used at eval
  # time — fingerprint stamped in checkpoint metadata.
  class_index_manifest: "data/phase6_5g_2/dogma_h5ads/cell_type_index.json"
  labels_obs_col: "cell_type"
  confidence_obs_col: "cell_type_confidence"
